name: reproduce
on: [push, pull_request]
jobs:
  repro:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[test]"
      - name: Absolute-path guard
        run: bash tools/check_paths.sh .
      - name: Offline unit test
        run: python tests/test_engine.py
      - name: Property-based + metamorphic tests
        run: PYTHONPATH=. pytest tests/ -q
      - name: Teeth check (suite is non-vacuous)
        run: PYTHONPATH=. python scripts/teeth_check.py
      - name: Independent symbolic re-derivation
        run: PYTHONPATH=. python scripts/verify_symbolic.py
      - name: Reproduce example domains (offline, from shipped caches)
        run: bash scripts/repro.sh
      - name: Assert reproduced numbers match committed (tolerance, never bit-exact)
        run: python scripts/check_reports.py
